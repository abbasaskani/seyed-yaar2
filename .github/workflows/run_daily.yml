name: Run daily + publish docs (atomic lean)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      COPERNICUSMARINE_LOG_LEVEL: INFO
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
      COPERNICUS_MARINE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUS_MARINE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
      SEYDYAAR_STRICT_COPERNICUS: "1"
      SEYDYAAR_REWRITE: "1"
      SEYDYAAR_TMPDIR: "backend/.seydyaar_tmp"
      SEYDYAAR_LOG_DIR: "docs/latest_staging/logs"
      SEYDYAAR_VERIFY_DIR: "docs/latest_staging/verify"
      SEYDYAAR_PAST_DAYS: "1"
      SEYDYAAR_FUTURE_DAYS: "5"
      SEYDYAAR_STEP_HOURS: "12"
      SEYDYAAR_GRID: "160x160"
      SEYDYAAR_ENABLE_OPS: "0"
      SEYDYAAR_ENABLE_VERTICAL: "0"
      SEYDYAAR_ENABLE_CHL_7D: "1"
      SEYDYAAR_ENABLE_CHL_ANOM: "0"
      SEYDYAAR_ENABLE_NPP_ANOM: "0"
      SEYDYAAR_WRITE_EXTENDED_LAYERS: "0"
      SEYDYAAR_WRITE_DIAGNOSTICS: "0"
      SEYDYAAR_COPY_VERIFY_NC: "0"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -U copernicusmarine

      - name: Prepare staging output
        run: |
          rm -rf docs/latest_staging || true
          mkdir -p docs/latest_staging/logs docs/latest_staging/verify
          echo "keep" > docs/latest_staging/logs/keep.txt
          echo "keep" > docs/latest_staging/verify/keep.txt

      - name: Run pipeline into staging
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/backend"
          python -m seydyaar run-daily \
            --out docs/latest_staging \
            --past-days "$SEYDYAAR_PAST_DAYS" \
            --future-days "$SEYDYAAR_FUTURE_DAYS" \
            --step-hours "$SEYDYAAR_STEP_HOURS" \
            --grid "$SEYDYAAR_GRID" \
            --species skipjack

      - name: Assert manifest + core outputs exist
        if: always()
        run: |
          echo "== logs =="
          ls -lah docs/latest_staging/logs || true
          test -f docs/latest_staging/logs/download_manifest.jsonl
          echo "== verify =="
          find docs/latest_staging/verify -maxdepth 3 -type f -print || true
          test -f docs/latest_staging/meta_index.json
          test -f docs/latest_staging/runs/main/meta.json
          test -f docs/latest_staging/runs/main/variants/auto/species/skipjack/meta.json
          test -f docs/latest_staging/runs/main/variants/auto/species/skipjack/mask_u8.bin

      - name: Upload verify + logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seydyaar_verify_and_logs
          path: |
            docs/latest_staging/logs/**
            docs/latest_staging/verify/**
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

      - name: Publish staging to docs/latest
        if: ${{ success() }}
        run: |
          rm -rf docs/latest.prev || true
          if [ -d docs/latest ]; then mv docs/latest docs/latest.prev; fi
          mv docs/latest_staging docs/latest
          rm -rf docs/latest.prev || true

      - name: Commit & push updated docs
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest
          git commit -m "Update docs/latest (auto)" || echo "No changes to commit"
          git push
